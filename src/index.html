            <div class="card-body">
                <h3 class="card-title fs-5">Will My Request Get Played?</h2>
                <p class="card-text">Requests will be played on a best endeavors basis. Just because a request is made, I cannot promise that it will be played.</p>
                <p class="card-text">In order to get played, a track must have a relatively stable beat between 110 and 150 beats per minute and must not be excessively offensive. Over the course of a 4-hour freestyle, I will plan to play between 8 and 16 requests and work to fit them into one of 4 journeys. If there are too many requests of a similar speed, then a selection will be made.</p>
                <h3 class="card-title fs-5">What if you don't have my song?</h2>
                <p class="card-text">If I do not have the song you have requested, I will preview that song online and if it matches our criteria, then I will attempt to purchase that song so I can play it.</p>
                <h3 class="card-title fs-5">Can I request more than one track?</h2>
                <p class="card-text">Yes, but in order to be fair to other dancers, your requests will be treated as options and I will attempt to honor just one of them.</p>
                <h3 class="card-title fs-5">Why are you buying tracks instead of streaming them?</h2>
                <p class="card-text">Artists make very little from streaming services and content on streaming services is not guaranteed to always be on that service. By purchasing a track, I support the artist and ensure that I have access to that track indefinitely.</p>
                <h3 class="card-title fs-5">Who Are These Events For?</h3>
                <p class="card-text">These Events are aimed at people who are into social partner dancing. Our specific style is known as Ceroc, but also commonly as Modern Jive.</p>
                <h3 class="card-title fs-5">Where Can I Learn To Dance?</h2>
                <p class="card-text"><a href="https://www.facebook.com/CerocYorkshire" target="_blank" rel="nofollow">Ceroc Yorkshire</a> host 3 regular class nights every week across the West Yorkshire region at venues in Tadcaster, Leeds and Ilkley. Doors open at 7:30pm, the beginners class starts at 7:45pm and the intermediate class starts at 9:00pm.</p>
                <p class="card-text">For more information, do checkout the <a href="https://www.facebook.com/CerocYorkshire" target="_blank" rel="nofollow">Ceroc Yorkshire</a> facebook page.</p>
